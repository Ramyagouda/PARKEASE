<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Parking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body class="light-ui">
    <div class="page-overlay" aria-hidden="true"></div>
    <nav class="navbar navbar-expand-lg navbar-pink shadow-sm py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-white" href="/">
          <span class="fs-4">🚘</span>
          <span>
            <strong>Smart Parking</strong>
            <div class="small" style="line-height:1.1; color: #000000;">Digital Network Park Ecosystem</div>
          </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navmenu">
          <form class="d-flex me-3" action="/search/" method="get">
            <input class="form-control me-2" name="q" placeholder="Search vehicle no" aria-label="Search">
            <button class="btn btn-pink btn-sm" type="submit">Search</button>
          </form>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/park/">Park</a></li>
            <li class="nav-item"><a class="nav-link" href="/remove/">Remove</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="page-overlay" aria-hidden="true"></div>
    <div class="bg-network">
      <div class="container my-2">
        {% block content %}{% endblock %}
      </div>
    </div>

    <footer class="dark-footer mt-5 py-3">
      <div class="container text-center small text-muted">© Smart Parking • Digital Network</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
  </body>
</html>
